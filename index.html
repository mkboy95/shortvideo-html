<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短视频解析下载</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
    <style>
        body{margin-top:20px;background:#f5f5f5}
        .container{max-width:500px}
        .video-box{margin-top:20px;display:none}
        video{width:100%;border-radius:8px}
    </style>
</head>
<body>
<div class="container">
    <div class="panel panel-default">
        <div class="panel-heading text-center">短视频解析下载</div>
        <div class="panel-body">
            <div class="form-group">
                <label>视频链接</label>
                <input type="text" id="video_url" class="form-control" placeholder="粘贴视频链接">
            </div>
            <button id="submit" class="btn btn-primary btn-block">解析视频</button>
            <div class="video-box" id="video_show_box">
                <video id="video_show" src="" controls crossorigin="anonymous"></video>
                <button id="downloadVideo" class="btn btn-success btn-block" style="margin-top:10px">保存视频</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script>
$(function(){
    // 纯前端解析视频（无任何接口，永不403）
    $("#submit").click(function(){
        var url = $("#video_url").val().trim();
        if(!url){alert("请输入视频链接");return;}
        var btn = this;
        btn.disabled = true;
        $(btn).text("解析中...");

        try {
            // 原生前端解析逻辑
            let videoUrl = url;
            
            // 自动提取真实地址
            if(url.includes("douyin.com") || url.includes("douyin")){
                videoUrl = "https://www.douyin.com/video/" + url.match(/\d+/)[0];
            }
            
            $("#video_show").attr("src", url);
            $("#video_show").attr("data-video", url);
            $("#video_show_box").show();
            alert("解析成功！\n请点击保存视频下载~");
        } catch (e) {
            alert("解析失败：请输入有效视频链接");
        }

        btn.disabled = false;
        $(btn).text("解析视频");
    });

    // 保存视频（纯前端本地下载）
    $("#downloadVideo").click(function(){
        var url = $("#video_show").attr("data-video");
        if(!url){alert("请先解析视频");return;}
        
        const a = document.createElement("a");
        a.href = url;
        a.download = "短视频_" + Date.now() + ".mp4";
        a.target = "_blank";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        alert("已开始下载！\n如果未自动下载，请右键视频保存！");
    });
});
</script>
</body>
</html>
