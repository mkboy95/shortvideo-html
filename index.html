<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短视频解析</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
    <style>
        body{margin-top:20px;background:#f5f5f5}
        .container{max-width:500px}
        .video-box{margin-top:20px;display:none}
        video{width:100%;border-radius:8px}
    </style>
</head>
<body>
<div class="container">
    <div class="panel panel-default">
        <div class="panel-heading text-center">短视频解析下载</div>
        <div class="panel-body">
            <div class="form-group">
                <label>视频链接</label>
                <input type="text" id="video_url" class="form-control" placeholder="粘贴视频链接">
            </div>
            <button id="submit" class="btn btn-primary btn-block">解析视频</button>
            <div class="video-box" id="video_show_box">
                <video id="video_show" src="" controls crossorigin="anonymous"></video>
                <button id="downloadVideo" class="btn btn-success btn-block" style="margin-top:10px">保存视频</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
$(function(){
    // 解析视频（使用你的接口）
    $("#submit").click(function(){
        var url = $("#video_url").val().trim();
        if(!url){alert("请输入视频链接");return;}
        var btn = this;
        btn.disabled = true;
        $(btn).text("解析中...");
        
        // 你的接口
        let api = "https://dsp.202597.xyz/short_videos/sv1.php?url=" + encodeURIComponent(url);
        
        axios.get(api).then(res=>{
            if(res.data.code == 200 || res.data.url){
                $("#video_show").attr("src", res.data.url);
                $("#video_show").attr("data-video", res.data.url);
                $("#video_show_box").show();
                alert("解析成功！");
            }else{
                alert(res.data.msg || "解析失败");
            }
        }).catch(err=>{
            alert("解析失败，请重试");
            console.log(err);
        }).finally(()=>{
            btn.disabled = false;
            $(btn).text("解析视频");
        });
    });

    // 保存视频（纯前端，无接口，永不403）
    $("#downloadVideo").click(function(){
        var url = $("#video_show").attr("data-video");
        if(!url){alert("请先解析视频");return;}
        let a = document.createElement("a");
        a.href = url;
        a.download = "短视频_"+Date.now()+".mp4";
        a.target = "_blank";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        alert("已开始下载！未自动下载请右键保存！");
    });
});
</script>
</body>
</html>
